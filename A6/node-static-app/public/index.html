<!DOCTYPE html>
<html>
<head>
  <title>Pastel Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>MyApp</h2>
    <ul>
      <li>Dashboard</li>
      <li>Users</li>
      <li>Reports</li>
      <li>Settings</li>
    </ul>
  </div>

  <!-- Main Content -->
  <div class="main">

    <!-- Header -->
    <div class="header">
      <h2>Dashboard</h2>
      <p>Welcome back!</p>
    </div>

    <!-- Cards -->
    <div class="cards">

      <div class="card pink">
        <h3>Users</h3>
        <p>120</p>
      </div>

      <div class="card blue">
        <h3>Orders</h3>
        <p>75</p>
      </div>

      <div class="card green">
        <h3>Revenue</h3>
        <p>₹12,500</p>
      </div>

      <div class="card purple">
        <h3>Feedback</h3>
        <p>32</p>
      </div>

    </div>

  </div>

</div>

</body>
</html>
